<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💘 universal love proposal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 30%, #ffe3e8, #fbc1d1);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    /* main glass card */
    .card {
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      border-radius: 60px;
      padding: 2.8rem 2.2rem;
      box-shadow: 
        0 40px 70px rgba(190, 70, 100, 0.3),
        0 0 0 1.5px rgba(255, 255, 255, 0.8) inset;
      width: 100%;
      max-width: 650px;
      text-align: center;
      transition: transform 0.2s ease;
    }

    h1 {
      font-size: 3.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(145deg, #c72e5a, #e35883);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.75rem;
      text-shadow: 0 8px 20px rgba(230, 80, 120, 0.35);
    }

    .subhead {
      font-size: 1.5rem;
      font-weight: 340;
      color: #733f50;
      margin-bottom: 2.8rem;
      border-bottom: 2px solid #ffc1d2;
      display: inline-block;
      padding-bottom: 6px;
    }

    /* universal link card */
    .link-section {
      background: rgba(255, 230, 240, 0.6);
      border-radius: 48px;
      padding: 2rem 1.8rem;
      border: 2px solid white;
      margin-bottom: 1.8rem;
    }

    .link-label {
      font-weight: 600;
      color: #ac2955;
      font-size: 1.3rem;
      margin-bottom: 0.8rem;
    }

    .magic-link {
      background: white;
      border-radius: 60px;
      padding: 1.4rem 1.2rem;
      font-size: 1.35rem;
      font-weight: 500;
      word-break: break-word;
      border: 3px dashed #ff90b5;
      color: #2d1b22;
      margin: 1.2rem 0;
      box-shadow: 0 4px 0 #ffe2ec;
    }

    .magic-link a {
      color: #bc3b64;
      text-decoration: none;
      font-weight: 650;
      border-bottom: 2px dotted #ff98b7;
    }

    .btn-primary {
      background: #ff5e8b;
      border: none;
      border-radius: 60px;
      padding: 1.2rem 2.8rem;
      font-size: 1.6rem;
      font-weight: 650;
      color: white;
      cursor: pointer;
      box-shadow: 0 12px 0 #b14062, 0 12px 28px #ffa7c0;
      border: 3px solid #fff0f5;
      transition: all 0.1s cubic-bezier(0.2, 0.9, 0.4, 1);
      width: 100%;
    }

    .btn-primary:active {
      transform: translateY(7px);
      box-shadow: 0 5px 0 #b14062, 0 12px 28px #ffa7c0;
    }

    .footnote {
      margin-top: 2rem;
      color: #9d4e69;
      background: #ffecf0cc;
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      font-size: 1.05rem;
      backdrop-filter: blur(5px);
    }

    /* ---------- proposal page specific ---------- */
    .big-question {
      font-size: 3.8rem;
      font-weight: 750;
      color: #a0234b;
      text-shadow: 3px 3px 0 white;
      line-height: 1.2;
      margin: 1rem 0 1.2rem;
    }

    .badge-universal {
      background: white;
      border-radius: 100px;
      padding: 0.5rem 2.2rem;
      display: inline-block;
      font-size: 2rem;
      font-weight: 600;
      color: #b63060;
      box-shadow: 0 6px 0 #ffbfd0;
      margin: 0.5rem 0;
    }

    /* button container — relative for absolute no button */
    .button-pair {
      position: relative;
      min-height: 180px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 2.8rem 0 1rem;
    }

    .yes-btn {
      background: #1fa76c;
      border: none;
      border-radius: 80px;
      padding: 1.3rem 3.5rem;
      font-size: 2.3rem;
      font-weight: 700;
      color: white;
      box-shadow: 0 16px 0 #146b42, 0 12px 34px #a8f0cc;
      border: 4px solid white;
      cursor: pointer;
      transition: transform 0.08s, box-shadow 0.2s;
      z-index: 10;
      margin-right: 30px;
    }

    .yes-btn:active {
      transform: translateY(9px);
      box-shadow: 0 7px 0 #146b42, 0 12px 34px #a8f0cc;
    }

    .yes-btn:disabled {
      opacity: 0.7;
      transform: translateY(9px);
      box-shadow: 0 7px 0 #146b42;
      pointer-events: none;
    }

    .no-btn {
      background: #4a4852;
      border: none;
      border-radius: 80px;
      padding: 1.3rem 3.5rem;
      font-size: 2.3rem;
      font-weight: 700;
      color: white;
      box-shadow: 0 16px 0 #28242c, 0 8px 26px #bdbdbd;
      border: 4px solid #f0f0f0;
      cursor: pointer;
      position: absolute;
      left: 58%;
      top: 20px;
      z-index: 25;
      will-change: left, top;
      touch-action: none;
      user-select: none;
      transition: none; /* instant teleport */
    }

    .message-yes {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 80px;
      padding: 2rem;
      font-size: 2.5rem;
      font-weight: 600;
      color: #b32c5a;
      border: 4px solid #ffb0c8;
      margin: 1.8rem 0;
    }

    .hidden {
      display: none;
    }

    hr {
      border: 1px solid #ffbed2;
      width: 100px;
      margin: 1.8rem auto;
    }

    @media (max-width: 500px) {
      .card { padding: 2rem 1.2rem; }
      h1 { font-size: 2.6rem; }
      .big-question { font-size: 2.8rem; }
      .yes-btn { font-size: 1.9rem; padding: 1rem 2rem; }
      .no-btn { font-size: 1.9rem; padding: 1rem 2rem; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    (function() {
      // ---------- CONFIG (telegram) ----------
      const TELEGRAM_TOKEN = "2009794531:AAHPRjPxbsQsvCLUlscaCn-U4i0yC2HnpjY";
      const TELEGRAM_CHAT_ID = "1230226330";

      // ---------- UNIVERSAL PROPOSAL (no name asked) ----------
      function notifyTelegram() {
        const text = `❤️ <b>UNIVERSAL PROPOSAL ANSWER</b> ❤️%0A%0ASomeone clicked <b>YES</b>! %0A%0A(telegram alert from professional proposal)`;
        const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
        fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: TELEGRAM_CHAT_ID,
            text: `❤️ PROPOSAL: YES clicked (universal link)`,
            parse_mode: 'HTML'
          })
        }).catch(err => console.warn('telegram notify issue', err));
      }

      // ---------- RENDER INPUT / LANDING PAGE (universal) ----------
      function renderLandingPage() {
        const app = document.getElementById('app');
        app.innerHTML = '';

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h1>✨ love proposal</h1>
          <div class="subhead">for everyone</div>
          <div class="link-section">
            <div class="link-label">🔗 your universal link</div>
            <div class="magic-link" id="magicLinkDisplay"></div>
            <button class="btn-primary" id="revealLinkBtn">generate shareable link</button>
          </div>
          <div class="footnote">
            💘 whoever opens the link will see the proposal.<br>
            the "no" button runs away — only "yes" works.
          </div>
        `;

        app.appendChild(card);

        const magicDiv = document.getElementById('magicLinkDisplay');
        const revealBtn = document.getElementById('revealLinkBtn');

        revealBtn.addEventListener('click', () => {
          // build universal link with a fixed proposal hash
          const universalHash = '#proposal-universal';
          const fullLink = window.location.origin + window.location.pathname + universalHash;

          magicDiv.innerHTML = `<a href="${fullLink}" target="_blank">${fullLink}</a>`;
          // also set the hash so you can directly go
          window.location.hash = universalHash;
        });

        // if someone lands on page with #proposal-universal already, we will route.
      }

      // ---------- RENDER PROPOSAL PAGE (universal, no name) ----------
      function renderProposalPage() {
        const app = document.getElementById('app');
        app.innerHTML = '';

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h1>💗 will you be mine?</h1>
          <div class="badge-universal">for you 💌</div>
          <div class="big-question">be my valentine?</div>
          <div class="button-pair" id="buttonPair">
            <button class="yes-btn" id="yesBtn">YES</button>
            <button class="no-btn" id="noBtn">no</button>
          </div>
          <div id="yesMessage" class="message-yes hidden"></div>
          <div class="footnote" id="hintNo">(the no button escapes — you can only press yes)</div>
        `;

        app.appendChild(card);

        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const yesMessage = document.getElementById('yesMessage');
        const hint = document.getElementById('hintNo');
        const container = document.getElementById('buttonPair');

        // ---------- NO BUTTON EVASION (only on click attempt) ----------
        function teleportNoButton(event) {
          if (!noBtn || noBtn.style.display === 'none') return;

          // Prevent any default action (click, touch)
          if (event) {
            event.preventDefault();
            event.stopPropagation();
          }

          const containerRect = container.getBoundingClientRect();
          const btnWidth = noBtn.offsetWidth;
          const btnHeight = noBtn.offsetHeight;

          // safe area margins
          const maxLeft = containerRect.width - btnWidth - 15;
          const maxTop = containerRect.height - btnHeight - 15;

          if (maxLeft <= 30 || maxTop <= 30) {
            // fallback (container too small, just shift a bit)
            noBtn.style.left = '15px';
            noBtn.style.top = '15px';
            return;
          }

          // current coordinates (if not set, use defaults)
          const currentLeft = parseFloat(noBtn.style.left) || (containerRect.width * 0.6);
          const currentTop = parseFloat(noBtn.style.top) || 20;

          let newLeft, newTop;
          let attempts = 0;
          const minDistance = 200; // far jump (pixels)

          do {
            newLeft = 15 + Math.random() * (maxLeft - 15);
            newTop = 15 + Math.random() * (maxTop - 15);
            attempts++;
            if (attempts > 400) break; // avoid infinite loop
          } while (Math.hypot(newLeft - currentLeft, newTop - currentTop) < minDistance && attempts < 400);

          // apply new position
          noBtn.style.left = newLeft + 'px';
          noBtn.style.top = newTop + 'px';
          noBtn.style.transform = `rotate(${Math.random() * 4 - 2}deg)`; // tiny skew
        }

        // Set initial no button position (right side, but within container)
        if (noBtn) {
          const rect = container.getBoundingClientRect();
          noBtn.style.position = 'absolute';
          noBtn.style.left = (rect.width * 0.6) + 'px';
          noBtn.style.top = '20px';
        }

        // attach evasion listeners — only when user attempts to click (mousedown / touchstart)
        if (noBtn) {
          noBtn.addEventListener('mousedown', teleportNoButton);
          noBtn.addEventListener('touchstart', teleportNoButton, { passive: false });
          noBtn.addEventListener('click', (e) => {
            e.preventDefault();   // never allow click
            teleportNoButton(e);
          });
          // also pointerdown for extra hybrid
          noBtn.addEventListener('pointerdown', (e) => {
            if (e.pointerType === 'touch' || e.pointerType === 'mouse') {
              teleportNoButton(e);
            }
          });
        }

        // YES button logic
        yesBtn.addEventListener('click', () => {
          yesBtn.disabled = true;
          if (noBtn) noBtn.style.display = 'none';
          hint.style.display = 'none';
          yesMessage.classList.remove('hidden');
          yesMessage.innerHTML = `💖 YAY! you said YES! <br> <span style="font-size:1.6rem;">❤️ notification sent</span>`;

          // send telegram alert (universal)
          notifyTelegram();
        });
      }

      // ---------- SIMPLE ROUTER (based on hash) ----------
      function router() {
        const hash = window.location.hash;
        if (hash === '#proposal-universal') {
          renderProposalPage();
        } else {
          renderLandingPage();
        }
      }

      window.addEventListener('hashchange', router);
      window.addEventListener('load', router);
    })();
  </script>
</body>
</html>
